<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文 AI 导航 - AI 情报中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: #fafbfc; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; transition: all 200ms cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding: 2rem; }
        .trend-up { color: #059669; }
        .trend-down { color: #dc2626; }
        .tier-t1 { background: #dbeafe; color: #1e40af; }
        .tier-t2 { background: #fef3c7; color: #92400e; }
        .tier-t3 { background: #f3f4f6; color: #4b5563; }
        .nav-link { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 150ms; }
        .nav-link:hover { background: #f3f4f6; }
        .nav-link.active { background: var(--active-color); color: white; }
        :root { --active-color: #e11d48; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex items-center justify-between h-14">
                <span class="text-lg font-semibold text-gray-900">AI 情报中心</span>
                <div class="flex items-center gap-1">
                    <a href="../" class="nav-link">🌍 全球</a>
                    <a href="./" class="nav-link active">🇨🇳 中文</a>
                    <a href="../skills/" class="nav-link">🔧 Skills</a>
                    <a href="../news/" class="nav-link">📰 资讯</a>
                    <a href="../models/" class="nav-link">🧠 模型</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 py-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">🇨🇳 中文 AI 导航</h1>
            <p class="text-gray-500">收录国内 AI 工具导航网站</p>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-6">
        <div class="grid grid-cols-4 gap-4">
            <div class="card p-4 text-center"><div class="text-2xl font-bold text-gray-900" id="statSites">-</div><div class="text-sm text-gray-500">收录数量</div></div>
            <div class="card p-4 text-center"><div class="text-2xl font-bold text-rose-600" id="statVisits">-</div><div class="text-sm text-gray-500">总月访问</div></div>
            <div class="card p-4 text-center"><div class="text-2xl font-bold text-emerald-600" id="statT1">-</div><div class="text-sm text-gray-500">T1 头部</div></div>
            <div class="card p-4 text-center"><div class="text-2xl font-bold text-gray-400" id="updateTime">-</div><div class="text-sm text-gray-500">更新时间</div></div>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 pb-4"><div class="flex flex-wrap gap-2" id="typeFilter"></div></section>

    <section class="max-w-6xl mx-auto px-6 pb-12">
        <div class="card overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">#</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">月访问</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">趋势</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">层级</th>
                    </tr>
                </thead>
                <tbody id="competitorTable" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </section>

    <div class="modal" id="detailModal"><div class="max-w-2xl w-full bg-white rounded-xl shadow-2xl m-auto" id="modalContent"></div></div>

    <footer class="border-t border-gray-200 py-6 bg-white">
        <div class="max-w-6xl mx-auto px-6 text-center text-gray-400 text-sm">由 小满 🌾 自动生成</div>
    </footer>

    <script>
        let data = null, currentType = 'all';
        const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--active-color').trim();

        async function loadData() {
            try { data = await (await fetch('data.json?v=' + Date.now())).json(); renderPage(); }
            catch (e) { console.error(e); }
        }

        function formatNumber(n) { if (!n) return '-'; if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K'; return n; }
        function calcGrowth(trend) { if (!trend || trend.length < 2) return 0; return ((trend[trend.length - 1] - trend[0]) / trend[0] * 100).toFixed(0); }

        function renderPage() {
            document.getElementById('statSites').textContent = data.competitors.length;
            document.getElementById('statVisits').textContent = formatNumber(data.competitors.reduce((s, c) => s + (c.monthlyVisits || 0), 0));
            document.getElementById('statT1').textContent = data.competitors.filter(c => c.tier === 'T1').length;
            const d = new Date(data.lastUpdated);
            document.getElementById('updateTime').textContent = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            renderTypeFilter(); renderTable();
        }

        function renderTypeFilter() {
            const types = ['all', ...new Set(data.competitors.map(c => c.type))];
            const counts = { all: data.competitors.length };
            types.forEach(t => { if (t !== 'all') counts[t] = data.competitors.filter(c => c.type === t).length; });
            document.getElementById('typeFilter').innerHTML = types.map(t => 
                `<button class="px-3 py-1.5 rounded-full text-sm transition ${currentType === t ? 'text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'}" style="${currentType === t ? 'background:' + accentColor : ''}" onclick="filterType('${t}')">${t === 'all' ? '全部' : t} (${counts[t]})</button>`
            ).join('');
        }

        function filterType(t) { currentType = t; renderTypeFilter(); renderTable(); }
        function getFiltered() { return currentType === 'all' ? data.competitors : data.competitors.filter(c => c.type === currentType); }

        function renderTable() {
            const comps = getFiltered().sort((a, b) => (b.monthlyVisits || 0) - (a.monthlyVisits || 0));
            document.getElementById('competitorTable').innerHTML = comps.map((c, i) => {
                const growth = calcGrowth(c.trafficTrend);
                const tierClass = c.tier === 'T1' ? 'tier-t1' : c.tier === 'T2' ? 'tier-t2' : 'tier-t3';
                return `<tr class="hover:bg-gray-50 cursor-pointer" onclick="showDetail('${c.id}')">
                    <td class="px-4 py-3 text-gray-400 text-sm">${i + 1}</td>
                    <td class="px-4 py-3"><div class="font-medium text-gray-900">${c.name}</div><div class="text-sm text-gray-400">${c.domain}</div></td>
                    <td class="px-4 py-3 text-sm text-gray-500">${c.type}</td>
                    <td class="px-4 py-3 text-right font-medium text-gray-900">${formatNumber(c.monthlyVisits)}</td>
                    <td class="px-4 py-3 text-right text-sm ${growth > 0 ? 'trend-up' : growth < 0 ? 'trend-down' : 'text-gray-400'}">${growth > 0 ? '+' : ''}${growth}%</td>
                    <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs font-medium ${tierClass}">${c.tier}</span></td>
                </tr>`;
            }).join('');
        }

        function showDetail(id) {
            const c = data.competitors.find(x => x.id === id); if (!c) return;
            const growth = calcGrowth(c.trafficTrend);
            const tierClass = c.tier === 'T1' ? 'tier-t1' : c.tier === 'T2' ? 'tier-t2' : 'tier-t3';
            document.getElementById('modalContent').innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div><div class="flex items-center gap-2 mb-1"><h2 class="text-xl font-bold text-gray-900">${c.name}</h2><span class="px-2 py-0.5 rounded text-xs font-medium ${tierClass}">${c.tier}</span></div><p class="text-gray-500">${c.domain} · ${c.type}</p></div>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                    </div>
                    <p class="text-gray-600 mb-6">${c.description || ''}</p>
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-gray-50 rounded-lg p-4 text-center"><div class="text-2xl font-bold text-gray-900">${formatNumber(c.monthlyVisits)}</div><div class="text-sm text-gray-500">月访问量</div></div>
                        <div class="bg-gray-50 rounded-lg p-4 text-center"><div class="text-2xl font-bold ${growth > 0 ? 'trend-up' : growth < 0 ? 'trend-down' : 'text-gray-400'}">${growth > 0 ? '+' : ''}${growth}%</div><div class="text-sm text-gray-500">6月增长</div></div>
                        <div class="bg-gray-50 rounded-lg p-4 text-center"><div class="text-2xl font-bold text-gray-900">${c.githubStars ? formatNumber(c.githubStars) + ' ⭐' : '-'}</div><div class="text-sm text-gray-500">GitHub</div></div>
                    </div>
                    ${c.features ? `<div class="mb-6"><div class="text-sm font-medium text-gray-700 mb-2">特色功能</div><div class="flex flex-wrap gap-2">${c.features.map(f => `<span class="px-2 py-1 rounded text-sm" style="background: ${accentColor}15; color: ${accentColor}">${f}</span>`).join('')}</div></div>` : ''}
                    ${c.trafficTrend && c.trafficTrend.length ? `<div class="mb-6"><div class="text-sm font-medium text-gray-700 mb-3">流量趋势</div><canvas id="trendChart" height="120"></canvas></div>` : ''}
                    <a href="${c.url}" target="_blank" class="block w-full text-white text-center py-3 rounded-lg transition font-medium" style="background: ${accentColor}">访问网站 →</a>
                </div>`;
            document.getElementById('detailModal').classList.add('active');
            if (c.trafficTrend && c.trafficTrend.length) {
                setTimeout(() => {
                    new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: { labels: ['10月', '11月', '12月', '1月', '2月', '3月'], datasets: [{ data: c.trafficTrend, borderColor: accentColor, backgroundColor: accentColor + '20', fill: true, tension: 0.4, pointRadius: 0 }] },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f3f4f6' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } }
                    });
                }, 100);
            }
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
        document.getElementById('detailModal').addEventListener('click', e => { if (e.target.id === 'detailModal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聚合网站情报中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 优化：使用 Geist 字体替代 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 优化：使用 Geist 字体系统 */
        body { 
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            /* 优化：使用带色调的深色背景，不是纯黑 */
            background: oklch(0.12 0.01 250);
        }
        
        /* 优化：使用专业的数据分析配色，避免紫色渐变 */
        .gradient-bg { 
            background: linear-gradient(135deg, 
                oklch(0.15 0.02 250) 0%, 
                oklch(0.18 0.03 240) 50%, 
                oklch(0.20 0.04 230) 100%
            );
        }
        
        /* 优化：使用专业的 easing 函数 */
        .card-hover { 
            transition: transform 200ms cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 200ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-hover:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 40px oklch(0 0 0 / 0.3);
        }
        
        .heatmap-cell { 
            transition: transform 150ms cubic-bezier(0.16, 1, 0.3, 1); 
            cursor: pointer; 
            position: relative;
        }
        .heatmap-cell:hover { 
            transform: scale(1.05); 
            z-index: 10;
        }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: oklch(0 0 0 / 0.85); 
            z-index: 100; 
            overflow-y: auto;
        }
        .modal.active { 
            display: flex; 
            align-items: flex-start; 
            justify-content: center; 
            padding: 2rem;
        }
        .modal-content { 
            max-width: 900px; 
            width: 100%; 
            margin: auto;
        }
        
        /* 优化：使用 OKLCH 色彩空间定义颜色 */
        .trend-up { color: oklch(0.7 0.15 145); }
        .trend-down { color: oklch(0.65 0.2 25); }
        
        /* 优化：玻璃态效果使用更专业的参数 */
        .glass { 
            background: oklch(1 0 0 / 0.06); 
            backdrop-filter: blur(12px); 
            border: 1px solid oklch(1 0 0 / 0.12);
        }
        
        /* 优化：层级徽章使用更专业的配色 */
        .tier-badge { 
            font-size: 10px; 
            padding: 2px 8px; 
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .tier-t1 { 
            background: linear-gradient(135deg, 
                oklch(0.7 0.15 45), 
                oklch(0.65 0.2 25)
            );
        }
        .tier-t2 { 
            background: linear-gradient(135deg, 
                oklch(0.6 0.2 250), 
                oklch(0.55 0.25 280)
            );
        }
        .tier-t3 { 
            background: linear-gradient(135deg, 
                oklch(0.45 0.02 250), 
                oklch(0.40 0.02 250)
            );
        }
        
        /* 优化：添加专业的 focus 状态 */
        a:focus-visible, button:focus-visible {
            outline: 2px solid oklch(0.6 0.2 250);
            outline-offset: 2px;
        }
        
        /* 优化：改进文字层次 */
        .text-primary { color: oklch(0.95 0.01 250); }
        .text-secondary { color: oklch(0.65 0.02 250); }
        .text-tertiary { color: oklch(0.50 0.02 250); }
        
        /* 优化：数据可视化配色 */
        .stat-number {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="min-h-screen text-primary">
    <!-- Navigation -->
    <nav class="glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-2 py-4 overflow-x-auto">
                <a href="./" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium whitespace-nowrap transition-all duration-200 hover:bg-blue-500">🌍 全球</a>
                <a href="cn/" class="px-4 py-2 glass hover:bg-white/10 text-secondary rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap">🇨🇳 中文</a>
                <a href="skills/" class="px-4 py-2 glass hover:bg-white/10 text-secondary rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap">🔧 Skills</a>
                <a href="news/" class="px-4 py-2 glass hover:bg-white/10 text-secondary rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap">📰 资讯</a>
                <a href="models/" class="px-4 py-2 glass hover:bg-white/10 text-secondary rounded-lg text-sm font-medium transition-all duration-200 whitespace-nowrap">🧠 模型</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="gradient-bg py-12 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between flex-wrap gap-6">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-tight">🌍 全球 AI 聚合网站情报中心</h1>
                    <p class="text-secondary text-base">AI Tools Directory 竞品监控 · 数据驱动决策</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-secondary" id="updateTime">加载中...</p>
                    <p class="text-xs text-tertiary" id="siteCount">-</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                <div>
                    <div class="text-3xl font-bold text-primary stat-number" id="statSites">-</div>
                    <div class="text-sm text-tertiary mt-1">收录网站</div>
                </div>
                <div>
                    <div class="text-3xl font-bold stat-number" style="color: oklch(0.6 0.2 250);" id="statVisits">-</div>
                    <div class="text-sm text-tertiary mt-1">总月访问</div>
                </div>
                <div>
                    <div class="text-3xl font-bold stat-number" style="color: oklch(0.7 0.15 145);" id="statTools">-</div>
                    <div class="text-sm text-tertiary mt-1">收录工具数</div>
                </div>
                <div>
                    <div class="text-3xl font-bold stat-number" style="color: oklch(0.65 0.2 280);" id="statT1">-</div>
                    <div class="text-sm text-tertiary mt-1">头部玩家</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Insights -->
        <section class="mb-8" id="insightsSection"></section>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-6">
            <button onclick="filterTier('all')" class="px-4 py-2 glass rounded-lg text-sm font-medium text-secondary hover:bg-white/10 transition-all duration-200 active-filter">全部</button>
            <button onclick="filterTier('T1')" class="px-4 py-2 glass rounded-lg text-sm font-medium text-secondary hover:bg-white/10 transition-all duration-200">T1 头部</button>
            <button onclick="filterTier('T2')" class="px-4 py-2 glass rounded-lg text-sm font-medium text-secondary hover:bg-white/10 transition-all duration-200">T2 腰部</button>
            <button onclick="filterTier('T3')" class="px-4 py-2 glass rounded-lg text-sm font-medium text-secondary hover:bg-white/10 transition-all duration-200">T3 长尾</button>
        </div>

        <!-- Sites Grid -->
        <div id="sitesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <!-- Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="glass rounded-2xl p-8 relative">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-secondary hover:text-primary text-2xl transition-colors duration-200">&times;</button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        let allSites = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch('data.json');
                allSites = await response.json();
                updateStats();
                renderInsights();
                renderSites();
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function updateStats() {
            const totalVisits = allSites.reduce((sum, site) => sum + (site.monthlyVisits || 0), 0);
            const totalTools = allSites.reduce((sum, site) => sum + (site.toolsCount || 0), 0);
            const t1Count = allSites.filter(s => s.tier === 'T1').length;

            document.getElementById('statSites').textContent = allSites.length;
            document.getElementById('statVisits').textContent = formatNumber(totalVisits);
            document.getElementById('statTools').textContent = formatNumber(totalTools);
            document.getElementById('statT1').textContent = t1Count;
            document.getElementById('updateTime').textContent = `更新时间：${new Date().toLocaleString('zh-CN')}`;
            document.getElementById('siteCount').textContent = `共 ${allSites.length} 个网站`;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function renderInsights() {
            const insights = allSites.filter(s => s.insights && s.insights.length > 0);
            if (insights.length === 0) return;

            const html = insights.map(site => {
                return site.insights.map(insight => `
                    <div class="glass rounded-xl p-6 mb-4 border-l-4" style="border-color: ${insight.color || 'oklch(0.6 0.2 250)'};">
                        <h3 class="font-bold text-lg mb-2 text-primary">${insight.title}</h3>
                        <p class="text-secondary text-sm leading-relaxed">${insight.content}</p>
                    </div>
                `).join('');
            }).join('');

            document.getElementById('insightsSection').innerHTML = html;
        }

        function renderSites() {
            const filtered = currentFilter === 'all' ? allSites : allSites.filter(s => s.tier === currentFilter);
            
            const html = filtered.map(site => `
                <div class="glass rounded-xl p-6 card-hover cursor-pointer" onclick="showDetail('${site.id}')">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <h3 class="font-bold text-lg text-primary">${site.name}</h3>
                                <span class="tier-badge tier-${site.tier.toLowerCase()}">${site.tier}</span>
                            </div>
                            <p class="text-xs text-tertiary">${site.url}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <div class="text-xs text-tertiary mb-1">月访问量</div>
                            <div class="text-xl font-bold stat-number" style="color: oklch(0.6 0.2 250);">${formatNumber(site.monthlyVisits || 0)}</div>
                        </div>
                        <div>
                            <div class="text-xs text-tertiary mb-1">全球排名</div>
                            <div class="text-xl font-bold stat-number text-primary">${site.globalRank ? '#' + formatNumber(site.globalRank) : '-'}</div>
                        </div>
                    </div>
                    
                    ${site.badge ? `<div class="inline-block px-3 py-1 rounded-full text-xs font-medium" style="background: oklch(0.6 0.2 250 / 0.15); color: oklch(0.7 0.2 250);">${site.badge}</div>` : ''}
                </div>
            `).join('');

            document.getElementById('sitesGrid').innerHTML = html;
        }

        function filterTier(tier) {
            currentFilter = tier;
            document.querySelectorAll('button[onclick^="filterTier"]').forEach(btn => {
                btn.classList.remove('active-filter', 'bg-white/10');
            });
            event.target.classList.add('active-filter', 'bg-white/10');
            renderSites();
        }

        function showDetail(id) {
            const site = allSites.find(s => s.id === id);
            if (!site) return;

            const html = `
                <h2 class="text-2xl font-bold mb-6 text-primary">${site.name}</h2>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-8">
                    <div>
                        <div class="text-sm text-tertiary mb-2">月访问量</div>
                        <div class="text-2xl font-bold stat-number" style="color: oklch(0.6 0.2 250);">${formatNumber(site.monthlyVisits || 0)}</div>
                    </div>
                    <div>
                        <div class="text-sm text-tertiary mb-2">全球排名</div>
                        <div class="text-2xl font-bold stat-number text-primary">${site.globalRank ? '#' + formatNumber(site.globalRank) : '-'}</div>
                    </div>
                    <div>
                        <div class="text-sm text-tertiary mb-2">跳出率</div>
                        <div class="text-2xl font-bold stat-number text-primary">${site.bounceRate || '-'}</div>
                    </div>
                    <div>
                        <div class="text-sm text-tertiary mb-2">平均停留</div>
                        <div class="text-2xl font-bold stat-number text-primary">${site.avgDuration || '-'}</div>
                    </div>
                    <div>
                        <div class="text-sm text-tertiary mb-2">页面/访问</div>
                        <div class="text-2xl font-bold stat-number text-primary">${site.pagesPerVisit || '-'}</div>
                    </div>
                    <div>
                        <div class="text-sm text-tertiary mb-2">主要国家</div>
                        <div class="text-2xl font-bold stat-number text-primary">${site.mainCountry || '-'}</div>
                    </div>
                </div>

                ${site.trend && site.trend.length > 0 ? `
                    <div class="mb-6">
                        <h3 class="text-lg font-bold mb-4 text-primary">访问趋势</h3>
                        <canvas id="trendChart" class="w-full" style="max-height: 300px;"></canvas>
                    </div>
                ` : ''}

                <div class="flex gap-4">
                    <a href="${site.url}" target="_blank" class="px-6 py-3 rounded-lg font-medium transition-all duration-200" style="background: oklch(0.6 0.2 250); color: white;">访问网站</a>
                    <button onclick="closeModal()" class="px-6 py-3 glass rounded-lg font-medium text-secondary hover:bg-white/10 transition-all duration-200">关闭</button>
                </div>
            `;

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');

            if (site.trend && site.trend.length > 0) {
                setTimeout(() => {
                    const ctx = document.getElementById('trendChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: site.trend.map((_, i) => `${i + 1}月`),
                            datasets: [{
                                label: '月访问量',
                                data: site.trend,
                                borderColor: 'oklch(0.6 0.2 250)',
                                backgroundColor: 'oklch(0.6 0.2 250 / 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointBackgroundColor: 'oklch(0.6 0.2 250)'
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { 
                                    beginAtZero: false, 
                                    grid: { color: 'oklch(1 0 0 / 0.1)' }, 
                                    ticks: { color: 'oklch(0.65 0.02 250)' } 
                                },
                                x: { 
                                    grid: { display: false }, 
                                    ticks: { color: 'oklch(0.65 0.02 250)' } 
                                }
                            }
                        }
                    });
                }, 100);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadData();
    </script>
</body>
</html>

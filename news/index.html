<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 资讯 - AI 情报中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: #f8fafc; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; transition: all 200ms cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .treemap-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #1e293b; }
        .treemap-cell { 
            position: absolute;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; 
            transition: all 150ms ease;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            padding: 4px;
        }
        .treemap-cell:hover { 
            z-index: 10; 
            filter: brightness(1.15);
            border-color: rgba(255,255,255,0.5);
        }
        .treemap-cell .name { font-weight: 600; text-align: center; line-height: 1.2; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .treemap-cell .visits { font-weight: 700; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .treemap-cell .domain-text { font-size: 10px; opacity: 0.8; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; padding: 2rem; }
        .trend-up { color: #059669; } .trend-down { color: #dc2626; }
        .tier-t1 { background: rgba(219,234,254,0.9); color: #1e40af; }
        .tier-t2 { background: rgba(254,243,199,0.9); color: #92400e; }
        .tier-t3 { background: rgba(241,245,249,0.9); color: #475569; }
        .nav-link { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 150ms; color: #64748b; }
        .nav-link:hover { background: #f1f5f9; color: #334155; }
        .nav-link.active { background: #d97706; color: white; }
        .insight-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; border-left: 4px solid; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white/80 backdrop-blur-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-14">
                <span class="text-lg font-semibold text-slate-900">AI 情报中心</span>
                <div class="flex items-center gap-1">
                    <a href="../" class="nav-link">🌍 全球</a>
                    <a href="../cn/" class="nav-link">🇨🇳 中文</a>
                    <a href="../skills/" class="nav-link">🔧 Skills</a>
                    <a href="../news/" class="nav-link active">📰 资讯</a>
                    <a href="../models/" class="nav-link">🧠 模型</a>
                    <a href="../openclaw/" class="nav-link">🦞 OpenClaw</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-br from-amber-500 to-orange-600 text-white">
        <div class="max-w-7xl mx-auto px-6 py-10">
            <h1 class="text-3xl font-bold mb-2">📰 AI 资讯</h1>
            <p class="text-white/80">AI 新闻、Newsletter、论文、播客</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 -mt-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="card p-5 text-center shadow-sm"><div class="text-3xl font-bold text-slate-900" id="statSites">-</div><div class="text-sm text-slate-500 mt-1">收录数量</div></div>
            <div class="card p-5 text-center shadow-sm"><div class="text-3xl font-bold" style="color:#7c3aed" id="statVisits">-</div><div class="text-sm text-slate-500 mt-1">总月访问</div></div>
            <div class="card p-5 text-center shadow-sm"><div class="text-3xl font-bold text-emerald-600" id="statT1">-</div><div class="text-sm text-slate-500 mt-1">T1 头部</div></div>
            <div class="card p-5 text-center shadow-sm"><div class="text-3xl font-bold text-slate-400" id="updateTime">-</div><div class="text-sm text-slate-500 mt-1">更新时间</div></div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-6"><div class="flex flex-wrap gap-2" id="typeFilter"></div></section>

    <section class="max-w-7xl mx-auto px-6 pb-8">
        <h2 class="text-xl font-bold text-slate-900 mb-4">🔥 流量热力图 <span class="text-sm font-normal text-slate-400 ml-2">面积 = 流量占比</span></h2>
        <div class="treemap-container" id="treemapGrid"></div>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-8" id="insightsSection"></section>

    <section class="max-w-7xl mx-auto px-6 pb-12">
        <h2 class="text-xl font-bold text-slate-900 mb-4">📊 完整排名</h2>
        <div class="card overflow-hidden shadow-sm">
            <table class="w-full">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">#</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">名称</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">类型</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase">月访问</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase">趋势</th>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase">层级</th>
                    </tr>
                </thead>
                <tbody id="competitorTable" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </section>

    <div class="modal" id="detailModal"><div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl m-auto" id="modalContent"></div></div>

    <footer class="border-t border-slate-200 py-6 bg-white">
        <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-sm">由 小满 🌾 自动生成</div>
    </footer>

    <script>
        let data = null, currentType = 'all';
        const accentColor = '#d97706';

        async function loadData() { try { data = await (await fetch('data.json?v=' + Date.now())).json(); renderPage(); } catch (e) { console.error(e); } }

        function formatNumber(n) { if (!n) return '-'; if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K'; return n; }
        function calcGrowth(trend) { if (!trend || trend.length < 2) return 0; return ((trend[trend.length - 1] - trend[0]) / trend[0] * 100).toFixed(0); }
        
        // 根据流量获取颜色
        function getHeatColor(value, max) {
            const ratio = value / max;
            if (ratio > 0.5) return '#ef4444';  // 红色 - 最高
            if (ratio > 0.3) return '#f97316';  // 橙色
            if (ratio > 0.15) return '#eab308'; // 黄色
            if (ratio > 0.08) return '#22c55e'; // 绿色
            if (ratio > 0.03) return '#06b6d4'; // 青色
            return '#6366f1';                    // 紫色 - 最低
        }

        // 简化的 Treemap 算法 - 水平/垂直交替分割
        function computeTreemap(items, x, y, width, height) {
            if (items.length === 0) return [];
            
            let total = items.reduce((s, i) => s + i.value, 0);
            const results = [];
            let remaining = [...items];
            let currentX = x, currentY = y, currentW = width, currentH = height;
            
            while (remaining.length > 0) {
                // 决定分割方向
                const isVertical = currentW >= currentH;
                const side = isVertical ? currentH : currentW;
                
                // 找到当前行的最佳项目（保持宽高比最优）
                let row = [];
                let rowValue = 0;
                let bestAspect = Infinity;
                
                for (let i = 0; i < remaining.length; i++) {
                    const testRow = [...row, remaining[i]];
                    const testValue = rowValue + remaining[i].value;
                    const rowRatio = testValue / total;
                    const rowSize = isVertical ? currentW * rowRatio : currentH * rowRatio;
                    
                    // 计算这个选择的最差宽高比
                    let worstInRow = 0;
                    testRow.forEach(item => {
                        const itemRatio = item.value / testValue;
                        const itemSize = side * itemRatio;
                        const aspect = Math.max(rowSize / itemSize, itemSize / rowSize);
                        worstInRow = Math.max(worstInRow, aspect);
                    });
                    
                    if (worstInRow <= bestAspect) {
                        bestAspect = worstInRow;
                        row = testRow;
                        rowValue = testValue;
                    } else {
                        break;
                    }
                }
                
                // 布局这一行
                const rowRatio = rowValue / total;
                const rowSize = isVertical ? currentW * rowRatio : currentH * rowRatio;
                
                let offset = 0;
                row.forEach(item => {
                    const itemRatio = item.value / rowValue;
                    const itemSize = side * itemRatio;
                    
                    if (isVertical) {
                        results.push({
                            ...item,
                            x: currentX,
                            y: currentY + offset,
                            width: rowSize,
                            height: itemSize
                        });
                        offset += itemSize;
                    } else {
                        results.push({
                            ...item,
                            x: currentX + offset,
                            y: currentY,
                            width: itemSize,
                            height: rowSize
                        });
                        offset += itemSize;
                    }
                });
                
                // 更新剩余区域
                if (isVertical) {
                    currentX += rowSize;
                    currentW -= rowSize;
                } else {
                    currentY += rowSize;
                    currentH -= rowSize;
                }
                
                remaining = remaining.slice(row.length);
                total = remaining.reduce((s, i) => s + i.value, 0) || 1;
            }
            
            return results;
        }

        function renderPage() {
            document.getElementById('statSites').textContent = data.competitors.length;
            document.getElementById('statVisits').textContent = formatNumber(data.competitors.reduce((s, c) => s + (c.monthlyVisits || 0), 0));
            document.getElementById('statT1').textContent = data.competitors.filter(c => c.tier === 'T1').length;
            const d = new Date(data.lastUpdated);
            document.getElementById('updateTime').textContent = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            renderTypeFilter(); renderTreemap(); renderInsights(); renderTable();
        }

        function renderTypeFilter() {
            const types = ['all', ...new Set(data.competitors.map(c => c.type))];
            const counts = { all: data.competitors.length };
            types.forEach(t => { if (t !== 'all') counts[t] = data.competitors.filter(c => c.type === t).length; });
            document.getElementById('typeFilter').innerHTML = types.map(t =>
                `<button class="px-4 py-2 rounded-full text-sm font-medium transition ${currentType === t ? 'text-white shadow-sm' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}" style="${currentType === t ? 'background:'+accentColor : ''}" onclick="filterType('${t}')">${t === 'all' ? '全部' : t} (${counts[t]})</button>`
            ).join('');
        }

        function filterType(t) { currentType = t; renderTypeFilter(); renderTreemap(); renderTable(); }
        function getFiltered() { return currentType === 'all' ? data.competitors : data.competitors.filter(c => c.type === currentType); }

        function renderTreemap() {
            const container = document.getElementById('treemapGrid');
            const comps = getFiltered().sort((a, b) => (b.monthlyVisits || 0) - (a.monthlyVisits || 0));
            
            if (comps.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-slate-400">暂无数据</div>';
                return;
            }
            
            const width = container.offsetWidth || 1200;
            const height = Math.max(500, Math.min(700, width * 0.5));
            container.style.height = height + 'px';
            
            const max = comps[0]?.monthlyVisits || 1;
            
            // 准备数据
            const items = comps.map(c => ({
                id: c.id,
                name: c.name,
                domain: c.domain,
                value: c.monthlyVisits || 1,
                tier: c.tier
            }));
            
            // 计算布局
            const layout = computeTreemap(items, 0, 0, width, height);
            
            // 渲染
            let html = '';
            layout.forEach(item => {
                const color = getHeatColor(item.value, max);
                const w = item.width;
                const h = item.height;
                
                // 根据方块大小调整字体
                const nameSize = Math.min(16, Math.max(10, Math.min(w, h) / 8));
                const visitSize = Math.min(24, Math.max(12, Math.min(w, h) / 5));
                const showDomain = w > 100 && h > 60;
                const showVisits = w > 60 && h > 40;
                const showName = w > 40 && h > 30;
                
                html += `<div class="treemap-cell" 
                    style="left: ${item.x}px; top: ${item.y}px; width: ${w}px; height: ${h}px; background: ${color};"
                    onclick="showDetail('${item.id}')"
                    title="${item.name}: ${formatNumber(item.value)} 月访问">
                    ${showName ? `<div class="name" style="font-size: ${nameSize}px;">${item.name}</div>` : ''}
                    ${showVisits ? `<div class="visits" style="font-size: ${visitSize}px;">${formatNumber(item.value)}</div>` : ''}
                    ${showDomain ? `<div class="domain-text">${item.domain?.split('/')[0] || ''}</div>` : ''}
                </div>`;
            });
            
            container.innerHTML = html;
        }

        function renderInsights() {
            const insights = data.insights || [];
            if (!insights.length) { document.getElementById('insightsSection').innerHTML = ''; return; }
            const colorMap = { blue: '#3b82f6', green: '#10b981', purple: '#8b5cf6', orange: '#f59e0b', red: '#ef4444' };
            document.getElementById('insightsSection').innerHTML = `
                <h2 class="text-xl font-bold text-slate-900 mb-4">💡 市场洞察</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${insights.map(i => `<div class="insight-card p-5" style="border-left-color: ${colorMap[i.color] || '#3b82f6'}">
                        <h3 class="font-semibold text-slate-900 mb-2">${i.title}</h3>
                        <p class="text-sm text-slate-500">${i.content}</p>
                    </div>`).join('')}
                </div>`;
        }

        function renderTable() {
            const comps = getFiltered().sort((a, b) => (b.monthlyVisits || 0) - (a.monthlyVisits || 0));
            document.getElementById('competitorTable').innerHTML = comps.map((c, i) => {
                const growth = calcGrowth(c.trafficTrend);
                const tierClass = c.tier === 'T1' ? 'tier-t1' : c.tier === 'T2' ? 'tier-t2' : 'tier-t3';
                return `<tr class="hover:bg-slate-50 cursor-pointer transition" onclick="showDetail('${c.id}')">
                    <td class="px-4 py-3 text-slate-400 text-sm">${i + 1}</td>
                    <td class="px-4 py-3"><div class="font-medium text-slate-900">${c.name}</div><div class="text-sm text-slate-400">${c.domain}</div></td>
                    <td class="px-4 py-3 text-sm text-slate-500">${c.type}</td>
                    <td class="px-4 py-3 text-right font-semibold text-slate-900">${formatNumber(c.monthlyVisits)}</td>
                    <td class="px-4 py-3 text-right text-sm font-medium ${growth > 0 ? 'trend-up' : growth < 0 ? 'trend-down' : 'text-slate-400'}">${growth > 0 ? '+' : ''}${growth}%</td>
                    <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs font-medium ${tierClass}">${c.tier}</span></td>
                </tr>`;
            }).join('');
        }

        function showDetail(id) {
            const c = data.competitors.find(x => x.id === id); if (!c) return;
            const growth = calcGrowth(c.trafficTrend);
            const tierClass = c.tier === 'T1' ? 'tier-t1' : c.tier === 'T2' ? 'tier-t2' : 'tier-t3';
            document.getElementById('modalContent').innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div><div class="flex items-center gap-2 mb-1"><h2 class="text-xl font-bold text-slate-900">${c.name}</h2><span class="px-2 py-0.5 rounded text-xs font-medium ${tierClass}">${c.tier}</span></div><p class="text-slate-500">${c.domain} · ${c.type}</p></div>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
                    </div>
                    <p class="text-slate-600 mb-6">${c.description || ''}</p>
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-slate-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-slate-900">${formatNumber(c.monthlyVisits)}</div><div class="text-sm text-slate-500">月访问量</div></div>
                        <div class="bg-slate-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold ${growth > 0 ? 'trend-up' : growth < 0 ? 'trend-down' : 'text-slate-400'}">${growth > 0 ? '+' : ''}${growth}%</div><div class="text-sm text-slate-500">6月增长</div></div>
                        <div class="bg-slate-50 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-slate-900">${c.githubStars ? formatNumber(c.githubStars) + ' ⭐' : '-'}</div><div class="text-sm text-slate-500">GitHub</div></div>
                    </div>
                    ${c.features ? `<div class="mb-6"><div class="text-sm font-medium text-slate-700 mb-2">特色功能</div><div class="flex flex-wrap gap-2">${c.features.map(f => `<span class="px-3 py-1 rounded-full text-sm" style="background:${accentColor}15;color:${accentColor}">${f}</span>`).join('')}</div></div>` : ''}
                    ${c.trafficTrend && c.trafficTrend.length ? `<div class="mb-6"><div class="text-sm font-medium text-slate-700 mb-3">📈 流量趋势</div><canvas id="trendChart" height="120"></canvas></div>` : ''}
                    <a href="${c.url}" target="_blank" class="block w-full text-white text-center py-3 rounded-xl transition font-medium" style="background:${accentColor}">访问网站 →</a>
                </div>`;
            document.getElementById('detailModal').classList.add('active');
            if (c.trafficTrend && c.trafficTrend.length) {
                setTimeout(() => {
                    new Chart(document.getElementById('trendChart'), {
                        type: 'line', data: { labels: ['10月', '11月', '12月', '1月', '2月', '3月'], datasets: [{ data: c.trafficTrend, borderColor: accentColor, backgroundColor: accentColor + '20', fill: true, tension: 0.4, pointRadius: 0 }] },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
                    });
                }, 100);
            }
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
        document.getElementById('detailModal').addEventListener('click', e => { if (e.target.id === 'detailModal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        
        // 窗口大小变化时重新渲染
        window.addEventListener('resize', () => { if (data) renderTreemap(); });
        
        loadData();
    </script>
</body>
</html>
